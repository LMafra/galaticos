name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    name: lint (clj-kondo)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clj-kondo
        run: |
          CLJ_KONDO_VERSION="2024.06.19"
          curl -sSLO "https://github.com/clj-kondo/clj-kondo/releases/download/v${CLJ_KONDO_VERSION}/clj-kondo-${CLJ_KONDO_VERSION}-linux-amd64.zip"
          unzip -o "clj-kondo-${CLJ_KONDO_VERSION}-linux-amd64.zip"
          sudo mv clj-kondo /usr/local/bin/
          chmod +x /usr/local/bin/clj-kondo

      - name: Lint Clojure/ClojureScript
        run: clj-kondo --lint src src-cljs --fail-level error

  frontend-compile:
    name: frontend (shadow-cljs compile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile ClojureScript
        run: |
          docker compose -f config/docker/docker-compose.dev.yml run --rm app clj -M:frontend -m shadow.cljs.devtools.cli compile app
        shell: bash

      - name: Cleanup
        if: always()
        run: docker compose -f config/docker/docker-compose.dev.yml down -v --remove-orphans
        shell: bash

  unit:
    name: unit (clj + cljs)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & run tests in dev image (with MongoDB)
        run: |
          docker compose -f config/docker/docker-compose.dev.yml up -d mongodb
          # Run tests in an ephemeral app container (includes clj + node)
          docker compose -f config/docker/docker-compose.dev.yml run --rm app ./bin/galaticos test
        shell: bash

      - name: Cleanup
        if: always()
        run: docker compose -f config/docker/docker-compose.dev.yml down -v --remove-orphans
        shell: bash

  e2e-dev:
    name: e2e (dev)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Start dev stack
        run: docker compose -f config/docker/docker-compose.dev.yml up -d --build
        shell: bash

      - name: Wait for /health
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:3000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for /health"
          docker compose -f config/docker/docker-compose.dev.yml ps
          docker compose -f config/docker/docker-compose.dev.yml logs --tail=200
          exit 1
        shell: bash

      - name: Seed smoke data
        run: ./bin/galaticos db:seed-smoke
        shell: bash

      - name: Install Node deps
        run: npm ci --no-fund --no-audit
        shell: bash

      - name: Install Playwright (with OS deps)
        run: npx playwright install --with-deps chromium
        shell: bash

      - name: Run Playwright tests
        env:
          E2E_BASE_URL: http://localhost:3000
        run: npm run e2e
        shell: bash

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-dev
          path: |
            playwright-report
            test-results

      - name: Cleanup
        if: always()
        run: docker compose -f config/docker/docker-compose.dev.yml down -v --remove-orphans
        shell: bash

  e2e-prod:
    name: e2e (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Start prod stack (CI override)
        env:
          JWT_SECRET: change-me-in-production
          MONGO_INITDB_ROOT_USERNAME: galaticos
          MONGO_INITDB_ROOT_PASSWORD: galaticos
        run: docker compose -f config/docker/docker-compose.prod.yml -f config/docker/docker-compose.prod.ci.yml up -d --build
        shell: bash

      - name: Wait for /health
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:3000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for /health"
          docker compose -f config/docker/docker-compose.prod.yml -f config/docker/docker-compose.prod.ci.yml ps
          docker compose -f config/docker/docker-compose.prod.yml -f config/docker/docker-compose.prod.ci.yml logs --tail=200
          exit 1
        shell: bash

      - name: Seed smoke data (Mongo auth)
        env:
          DATABASE_URL: mongodb://galaticos:galaticos@localhost:27017/galaticos?authSource=admin
          DATABASE_NAME: galaticos
        run: ./bin/galaticos db:seed-smoke
        shell: bash

      - name: Install Node deps
        run: npm ci --no-fund --no-audit
        shell: bash

      - name: Install Playwright (with OS deps)
        run: npx playwright install --with-deps chromium
        shell: bash

      - name: Run Playwright tests
        env:
          E2E_BASE_URL: http://localhost:3000
        run: npm run e2e
        shell: bash

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-prod
          path: |
            playwright-report
            test-results

      - name: Cleanup
        if: always()
        run: docker compose -f config/docker/docker-compose.prod.yml -f config/docker/docker-compose.prod.ci.yml down -v --remove-orphans
        shell: bash


