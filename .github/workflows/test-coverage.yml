name: Test Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  coverage:
    name: Test Coverage (80% lines, 70% branches)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admin123
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Set up Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: 1.11.1.1429

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: clojure-deps-${{ hashFiles('deps.edn', 'deps-lock.edn') }}
          restore-keys: |
            clojure-deps-

      - name: Download Clojure dependencies
        run: clojure -P -M:test:coverage

      - name: Run backend coverage
        env:
          MONGO_URI: mongodb://admin:admin123@localhost:27017/galaticos-test?authSource=admin
        run: ./bin/galaticos coverage
        continue-on-error: false

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: target/coverage/
          retention-days: 30

      - name: Start application for E2E tests
        env:
          MONGO_URI: mongodb://admin:admin123@localhost:27017/galaticos-test?authSource=admin
          PORT: 3000
        run: |
          ./bin/galaticos run &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> $GITHUB_ENV
          
          # Wait for app to be ready
          echo "Waiting for application to start..."
          for i in {1..30}; do
            if curl -f http://localhost:3000 >/dev/null 2>&1; then
              echo "Application is ready!"
              break
            fi
            echo "Attempt $i/30: Application not ready yet..."
            sleep 2
          done

      - name: Seed test data
        run: ./bin/galaticos db:seed-smoke

      - name: Run E2E tests
        env:
          E2E_BASE_URL: http://localhost:3000
        run: ./bin/galaticos e2e
        continue-on-error: true

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload E2E coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-coverage-report
          path: playwright-coverage/
          retention-days: 30

      - name: Stop application
        if: always()
        run: |
          if [ ! -z "$APP_PID" ]; then
            kill $APP_PID || true
          fi

      - name: Generate coverage summary
        if: always()
        run: |
          echo "## 📊 Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend Coverage (Clojure)" >> $GITHUB_STEP_SUMMARY
          if [ -f "target/coverage/coverage.txt" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat target/coverage/coverage.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No backend coverage data found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Requirements" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Line Coverage: **≥80%**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Branch Coverage: **≥70%**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 [View detailed reports in artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Check coverage thresholds
        run: |
          echo "Verifying coverage thresholds..."
          if [ -f "target/coverage/coverage.txt" ]; then
            echo "✅ Backend coverage check completed"
            echo "Coverage requirements enforced by Cloverage (80% lines, 70% branches)"
          else
            echo "❌ Coverage validation failed"
            exit 1
          fi

  # Optional: Upload to Codecov
  codecov:
    name: Upload to Codecov
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-report
          path: target/coverage/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./target/coverage/codecov.json
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

