<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galáticos - Sistema de Gestão de Elenco Esportivo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #app {
            min-height: 100vh;
        }
        .skip-link {
            position: absolute;
            left: -9999px;
            z-index: 999;
            padding: 0.75rem 1rem;
            background: #7c2d12;
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            border-radius: 0.5rem;
        }
        .skip-link:focus {
            left: 1rem;
            top: 1rem;
        }
    </style>
    <link rel="stylesheet" href="/css/app.css">
    <!-- Dev-only: reduz ruído no console (React DevTools, shadow-cljs ready). Não altera produção em host real. -->
    <script>
      (function () {
        var h = location.hostname;
        if (h !== 'localhost' && h !== '127.0.0.1') return;
        function skipNoise(args) {
          var a0 = args[0];
          if (typeof a0 !== 'string') return false;
          if (a0.indexOf('shadow-cljs:') === 0) return true;
          if (a0.indexOf('Download the React DevTools') !== -1) return true;
          /* xhr.io costuma logar GET … 401 no console.error */
          if (a0.indexOf('/api/auth/check') !== -1 && a0.indexOf('401') !== -1) return true;
          return false;
        }
        function wrap(method) {
          var orig = console[method];
          if (typeof orig !== 'function') return;
          console[method] = function () {
            if (skipNoise(arguments)) return;
            return orig.apply(console, arguments);
          };
        }
        wrap('log');
        wrap('info');
        wrap('error');
      })();
    </script>
</head>
<body>
    <a href="#main-content" class="skip-link">Pular para o conteúdo</a>
    <div id="app">
        <div class="loading">Carregando aplicação...</div>
    </div>
    <script src="/js/compiled/app.js"></script>
</body>
</html>
